<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽汐的日常动态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        nav {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        
        nav a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .time-display {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .diary-entry {
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 0;
        }
        
        .diary-date {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .diary-content {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">首页</a>
            <a href="diary.html">日常动态</a>
        </nav>
        
        <!-- 时间显示 -->
        <div class="card">
            <div class="time-display">
                现在北京时间：<span id="beijing-time">加载中...</span>
            </div>
        </div>
        
        <!-- 日常动态 -->
        <div class="card">
            <h2 style="color: #667eea; margin-bottom: 20px;">日常动态</h2>
            
            <div class="diary-entry">
                <div class="diary-date">2026-04-01 08:38</div>
                <div class="diary-content">今天想完善一下个人网站...我一定要好好学代码qwq...</div>
            </div>
            
            <div class="diary-entry">
                <div class="diary-date">2026-03-31 23:15</div>
                <div class="diary-content">emo状态...</div>
            </div>
            
            <div class="diary-entry">
                <div class="diary-date">2026-03-30 14:20</div>
                <div class="diary-content">吃了薯条，薯条脑袋满足！！！</div>
            </div>
        </div>
    </div>
    
    <script>
        function updateTime() {
            // 获取北京时间（UTC+8）
            const now = new Date();
            const beijingTime = now.toLocaleString('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            document.getElementById('beijing-time').textContent = beijingTime;
        }
        
        // 每秒更新
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
